name: Update OpenRouter free model fallbacks

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-free-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh OpenRouter free fallback list
        run: python3 scripts/update_openrouter_free_models.py

      - name: Commit updated fallback list
        run: |
          if git diff --quiet; then
            echo "No OpenRouter free model changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/openrouter_free_models.py render.yaml
          git commit -m "chore: refresh openrouter free model fallbacks"
          git push
