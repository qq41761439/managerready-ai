services:
  - type: web
    name: managerready-ai-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: AI_PROVIDER
        value: openai_compatible
      - key: AI_PROVIDER_NAME
        value: openrouter
      - key: AI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: AI_FALLBACK_MODELS
        value: tencent/hy3:free,poolside/laguna-xs-2.1:free,cohere/north-mini-code:free,nvidia/nemotron-3-ultra-550b-a55b:free,poolside/laguna-m.1:free,nvidia/nemotron-3-super-120b-a12b:free,openrouter/free,nvidia/nemotron-3-nano-30b-a3b:free
      - key: AI_TIMEOUT_SECONDS
        value: "90"
      - key: AI_ENABLE_MOCK_FALLBACK
        value: "0"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app,http://localhost:3000
